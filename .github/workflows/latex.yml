name: Build resumes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-resumes
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile every .tex resume in src/
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src
          root_file: "*.tex"

      - name: Move compiled PDFs to repo root
        run: mv src/*.pdf .

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: "*.pdf"

      - name: Commit PDFs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- *.pdf
          git diff --cached --quiet || git commit -m "chore: rebuild resume PDFs [skip ci]"
          git push
