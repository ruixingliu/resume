name: Build resumes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-resumes
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Latin-script resumes (pdflatex) in src/
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src
          root_file: "*.tex"

      - name: Compile CJK resumes (xelatex + ctex) in src/zh/
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src/zh
          root_file: "*.tex"
          latexmk_use_xelatex: true

      - name: Move compiled PDFs to repo root
        run: |
          mv src/*.pdf .
          mv src/zh/*.pdf .

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: "*.pdf"

      - name: Commit PDFs back to repo (and prune orphans)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 删掉根目录里找不到对应 .tex 源文件的孤儿 PDF (重命名/删除后自愈)
          for pdf in *.pdf; do
            [ -e "$pdf" ] || continue
            base=$(basename "$pdf" .pdf)
            if [ -z "$(find src -type f -name "$base.tex" -print -quit)" ]; then
              echo "Pruning orphan PDF (no matching src/**/$base.tex): $pdf"
              git rm --quiet --ignore-unmatch -- "$pdf" || rm -f -- "$pdf"
            fi
          done
          git add -- *.pdf
          git diff --cached --quiet || git commit -m "chore: rebuild resume PDFs [skip ci]"
          git push
